<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuAgent Chat Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #chat-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  #chat-header {
    padding: 0.875rem 1rem;
    background: #2563eb;
    color: white;
    display: flex;
    align-items: center;
    gap: 0.625rem;
  }

  #chat-header .avatar {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  #chat-header .info { flex: 1; }
  #chat-header .name { font-weight: 600; font-size: 0.875rem; }
  #chat-header .status { font-size: 0.75rem; opacity: 0.85; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 0.625rem 0.875rem;
    border-radius: 14px;
    font-size: 0.8125rem;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: #2563eb;
    color: white;
    border-radius: 14px 14px 2px 14px;
  }
  .msg.assistant .bubble {
    background: #f4f4f5;
    color: #1a1a1a;
    border-radius: 14px 14px 14px 2px;
  }

  .sources {
    display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.25rem;
  }
  .source-badge {
    font-size: 0.65rem; padding: 0.1rem 0.4rem;
    background: #eff6ff; color: #3b5bdb;
    border-radius: 999px; border: 1px solid #c5d0fa;
  }

  #typing {
    display: none;
    align-self: flex-start;
  }
  #typing .bubble {
    background: #f4f4f5;
    border-radius: 14px 14px 14px 2px;
  }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #888;
    border-radius: 50%;
    margin: 0 1px;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  #input-area {
    padding: 0.75rem;
    border-top: 1px solid #e8e8e8;
    display: flex;
    gap: 0.5rem;
    background: white;
  }

  #user-input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    font-size: 0.8125rem;
    font-family: inherit;
    outline: none;
    color: #1a1a1a;
    background: white;
    resize: none;
    line-height: 1.5;
  }
  #user-input:focus { border-color: #2563eb; }

  #send-btn {
    width: 36px; height: 36px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

  #welcome {
    text-align: center;
    padding: 2rem 1rem;
    color: #888;
  }
  #welcome .icon { font-size: 2rem; margin-bottom: 0.5rem; }
  #welcome p { font-size: 0.8125rem; line-height: 1.6; }
</style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name" id="widget-name">Asszisztens</div>
      <div class="status">● Online</div>
    </div>
  </div>

  <div id="messages">
    <div id="welcome">
      <div class="icon">💬</div>
      <p>Szia! Miben segíthetek?<br>Kérdezz bátran a dokumentumainkkal kapcsolatban.</p>
    </div>
    <div class="msg assistant" id="typing" style="display:none">
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Írj üzenetet..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // Config — iframe src URL paraméterekből
  const params   = new URLSearchParams(window.location.search);
  const API_URL  = params.get('api_url') || 'http://localhost:8000';
  const SLUG     = params.get('tenant_slug') || 'demo';
  const NAME     = params.get('name') || 'Asszisztens';

  document.getElementById('widget-name').textContent = NAME;

  let sessionId = null;
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const typingEl   = document.getElementById('typing');
  let welcomeEl    = document.getElementById('welcome');

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(role, content, sources) {
    if (welcomeEl) {
      welcomeEl.remove();
      welcomeEl = null;
    }

    const msg = document.createElement('div');
    msg.className = 'msg ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    msg.appendChild(bubble);

    if (sources && sources.length > 0) {
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      sources.forEach(s => {
        const badge = document.createElement('span');
        badge.className = 'source-badge';
        badge.textContent = '📄 ' + s.filename + ' · ' + Math.round(s.score * 100) + '%';
        sourcesEl.appendChild(badge);
      });
      msg.appendChild(sourcesEl);
    }

    messagesEl.insertBefore(msg, typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    appendMessage('user', question);

    typingEl.style.display = 'flex';
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch(API_URL + '/api/widget/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: question,
          session_id: sessionId,
          tenant_slug: SLUG
        })
      });

      const data = await res.json();
      sessionId = data.session_id;
      typingEl.style.display = 'none';
      appendMessage('assistant', data.answer, data.sources);
    } catch (e) {
      typingEl.style.display = 'none';
      appendMessage('assistant', 'Sajnálom, hiba történt. Kérlek próbáld újra.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
